local_backend: true

backend:
  name: github
  repo: ktuley/DataPort
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:  
  - name: "pages"
    label: "Pages"
    files:
      - file: "content/home.md"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
