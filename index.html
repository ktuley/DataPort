<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Balloon Pilot Docs</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
  }

  /* SIDEBAR */
  nav {
    width: 250px;
    background: #f5f5f5;
    padding: 15px;
  }

  /* LINKS + HEADERS */
  nav a,
  .menu-header {
    display: block;
    padding: 6px 8px;
    margin: 2px 0;
    text-decoration: none;
    color: #333;
  }

  /* HOVER */
  nav a:hover {
    background: #e8e8e8;
  }

  /* MENU GROUP */
  .menu-group {
    margin: 2px 0;
  }

  /* HEADER (collapsible sections) */
  .menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-weight: 600;
    color: #222;
  }

  /* SUBMENU */
  .submenu {
    margin-left: 12px;
    display: block;
  }

  /* 🔽 ARROW */
  .arrow {
    font-size: 12px;
    transition: transform 0.2s ease;
  }

  /* 🔼 ROTATE WHEN OPEN */
  .menu-group.open .arrow {
    transform: rotate(180deg);
  }

  /* 🔴 ACTIVE PAGE (BPDP STYLE) */
  nav a.active {
    background: #fbeaea;
    border-left: 4px solid #a80000;
    padding-left: 6px;
  }

  /* ACTIVE HOVER */
  nav a.active:hover {
    background: #f6dcdc;
  }

  /* OPTIONAL: highlight open section */
  .menu-group.open .menu-header {
    color: #eeeeee;
  }

  /* MAIN CONTENT */
  main {
    flex: 1;
    padding: 20px;
  }

  /* PAGE TITLE */
  h1 {
    margin-top: 0;
  }
    nav a {
  display: flex;
  align-items: center;
  gap: 6px;
}
</style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav>

    <a href="#" onclick="loadPage('home', this)">🏠 Home</a>

    <!-- WHAT IS BPDP -->
    <div class="menu-group" id="group-bpdp">
      <div class="menu-header" onclick="toggle('bpdp','group-bpdp')">
        What is BPDP <span class="arrow">▾</span>
      </div>
      <div id="bpdp" class="submenu">
        <a href="#" onclick="loadPage('what-is-bpdp/what-is-bpdp', this)">Overview</a>
        <a href="#" onclick="loadPage('what-is-bpdp/about-bpdp', this)">About BPDP</a>
        <a href="#" onclick="loadPage('what-is-bpdp/about-ken', this)">About Ken</a>
      </div>
    </div>

    <a href="#" onclick="loadPage('get-started', this)">Get Started</a>
    <a href="#" onclick="loadPage('latest-news', this)">Latest News</a>
    <a href="#" onclick="loadPage('participants', this)">Who's Participating?</a>
    <a href="#" onclick="loadPage('reviews', this)">Data Port Reviews</a>
    <a href="#" onclick="loadPage('quick-links', this)">Quick Links</a>
    <a href="#" onclick="loadPage('instructions', this)">Instructions</a>
    <a href="#" onclick="loadPage('faqs', this)">FAQs</a>

    <!-- CONTACT -->
    <div class="menu-group" id="group-contact">
      <div class="menu-header" onclick="toggle('contact','group-contact')">
        Contact Us <span class="arrow">▾</span>
      </div>
      <div id="contact" class="submenu">
        <a href="#" onclick="loadPage('contact-us/contact-us', this)">Contact</a>
        <a href="#" onclick="loadPage('contact-us/legal', this)">Legal</a>
      </div>
    </div>

  </nav>

  <!-- CONTENT -->
  <main>
    <h1 id="title"></h1>
    <div id="content"></div>
  </main>

  <script>
    function loadPage(page, el) {
      fetch('/content/' + page + '.md')
        .then(response => response.text())
        .then(text => {
          const lines = text.split('\n');

          let title = '';
          let body = '';
          let inFrontMatter = false;

          lines.forEach(line => {
            if (line.trim() === '---') {
              inFrontMatter = !inFrontMatter;
              return;
            }

            if (inFrontMatter && line.startsWith('title:')) {
              title = line.replace('title:', '').trim().replace(/"/g, '');
            } else if (!inFrontMatter) {
              body += line + '\n';
            }
          });

          document.getElementById('title').innerText = title;
          document.getElementById('content').innerText = body;

          // Active highlight
          document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
          if (el) el.classList.add('active');
        });
    }

    function toggle(id, groupId) {
      const el = document.getElementById(id);
      const group = document.getElementById(groupId);

      const isHidden = el.style.display === 'none';

      el.style.display = isHidden ? 'block' : 'none';

      if (group) {
        group.classList.toggle('open', isHidden);
      }
    }

    // Load home on first visit
    loadPage('home');
  </script>

</body>
</html>
