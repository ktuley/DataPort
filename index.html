<!DOCTYPE html>
<html>
<style>
  nav {
    width: 250px;
    background: #f4f4f4;
    padding: 15px;
  }

  nav a {
    display: block;
    padding: 6px 8px;
    margin: 2px 0;
    text-decoration: none;
    color: #333;
  }

  nav a:hover {
    background: #e0e0e0;
  }

  .menu-group {
    margin-bottom: 10px;
  }

  .menu-header {
    display: flex;
    justify-content: space-between;
    cursor: pointer;
    padding: 6px 8px;
    font-weight: bold;
  }

  .submenu {
    margin-left: 12px;
    display: block;
  }

  .arrow {
    font-size: 12px;
  }
</style>
<body style="margin:0; font-family: Arial; display:flex;">

 <nav>

  <a href="#" onclick="loadPage('home')">Home</a>

  <!-- WHAT IS BPDP -->
  <div class="menu-group">
    <div class="menu-header" onclick="toggle('bpdp')">
      What is BPDP <span class="arrow">▾</span>
    </div>
    <div id="bpdp" class="submenu">
      <a href="#" onclick="loadPage('what-is-bpdp/what-is-bpdp')">What is BPDP</a>
      <a href="#" onclick="loadPage('what-is-bpdp/about-bpdp')">About BPDP</a>
      <a href="#" onclick="loadPage('what-is-bpdp/about-ken')">About Ken</a>
    </div>
  </div>

  <a href="#" onclick="loadPage('get-started')">Get Started</a>
  <a href="#" onclick="loadPage('latest-news')">Latest News</a>
  <a href="#" onclick="loadPage('participants')">Who's Participating?</a>
  <a href="#" onclick="loadPage('reviews')">Data Port Reviews</a>
  <a href="#" onclick="loadPage('quick-links')">Quick Links</a>
  <a href="#" onclick="loadPage('instructions')">Instructions</a>
  <a href="#" onclick="loadPage('faqs')">FAQs</a>

  <!-- CONTACT -->
  <div class="menu-group">
    <div class="menu-header" onclick="toggle('contact')">
      Contact Us <span class="arrow">▾</span>
    </div>
    <div id="contact" class="submenu">
      <a href="#" onclick="loadPage('contact-us/contact-us')">Contact Us</a>
      <a href="#" onclick="loadPage('contact-us/legal')">Legal</a>
    </div>
  </div>

</nav>

  <!-- MAIN CONTENT -->
  <main style="flex:1; padding:20px;">
    <h1 id="title"></h1>
    <div id="content"></div>
  </main>

  <script>
    function loadPage(page) {
      fetch('/content/' + page + '.md')
        .then(response => response.text())
        .then(text => {
          const lines = text.split('\n');

          let title = '';
          let body = '';
          let inFrontMatter = false;

          lines.forEach(line => {
            if (line.trim() === '---') {
              inFrontMatter = !inFrontMatter;
              return;
            }

            if (inFrontMatter && line.startsWith('title:')) {
              title = line.replace('title:', '').trim().replace(/"/g, '');
            } else if (!inFrontMatter) {
              body += line + '\n';
            }
          });

          document.getElementById('title').innerText = title;
          document.getElementById('content').innerText = body;
        });
    }

    function toggle(id) {
      const el = document.getElementById(id);
      el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // Load home page on first visit
    loadPage('home');
  </script>

</body>
</html>
