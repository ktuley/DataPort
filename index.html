<!DOCTYPE html>
<html>
<style>
  nav a {
    display: block;
    margin: 6px 0;
    text-decoration: none;
    color: #333;
  }

  nav div {
    margin-bottom: 10px;
  }

  nav strong {
    display: block;
    margin: 8px 0;
    cursor: pointer;
  }
</style>
<body style="margin:0; font-family: Arial; display:flex;">

  <!-- NAVIGATION -->
  <nav style="width:250px; background:#f4f4f4; padding:15px;">

    <a href="#" onclick="loadPage('home')">Home</a>

    <div>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <a href="#" onclick="loadPage('what-is-bpdp/index')">What is BPDP</a>
    <span onclick="toggle('bpdp')" style="cursor:pointer;">▾</span>
  </div>

  <div id="bpdp" style="margin-left:15px;">
    <a href="#" onclick="loadPage('what-is-bpdp/about-bpdp')">About BPDP</a>
    <a href="#" onclick="loadPage('what-is-bpdp/about-ken')">About Ken</a>
  </div>
</div>
</div>
    </div>

    <a href="#" onclick="loadPage('get-started')">Get Started</a>
    <a href="#" onclick="loadPage('latest-news')">Latest News</a>
    <a href="#" onclick="loadPage('participants')">Who's Participating?</a>
    <a href="#" onclick="loadPage('reviews')">Data Port Reviews</a>
    <a href="#" onclick="loadPage('quick-links')">Quick Links</a>
    <a href="#" onclick="loadPage('instructions-faq')">Instructions & FAQs</a>

   <div>
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <a href="#" onclick="loadPage('contact/index')">Contact Us</a>
    <span onclick="toggle('contact')" style="cursor:pointer;">▾</span>
  </div>

  <div id="contact" style="margin-left:15px;">
    <a href="#" onclick="loadPage('contact/legal')">Legal</a>
  </div>
</div>

  </nav>

  <!-- MAIN CONTENT -->
  <main style="flex:1; padding:20px;">
    <h1 id="title"></h1>
    <div id="content"></div>
  </main>

  <script>
    function loadPage(page) {
      fetch('/content/' + page + '.md')
        .then(response => response.text())
        .then(text => {
          const lines = text.split('\n');

          let title = '';
          let body = '';
          let inFrontMatter = false;

          lines.forEach(line => {
            if (line.trim() === '---') {
              inFrontMatter = !inFrontMatter;
              return;
            }

            if (inFrontMatter && line.startsWith('title:')) {
              title = line.replace('title:', '').trim().replace(/"/g, '');
            } else if (!inFrontMatter) {
              body += line + '\n';
            }
          });

          document.getElementById('title').innerText = title;
          document.getElementById('content').innerText = body;
        });
    }

    function toggle(id) {
      const el = document.getElementById(id);
      el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // Load home page on first visit
    loadPage('home');
  </script>

</body>
</html>
